<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calau Neteja">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1b4332">
<title>Calau · Neteja</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{--bg:#f0f7f2;--bg-card:#fff;--text:#1a2e1f;--text-light:#5a7a62;--border:#cce4d4;--accent:#2d6a4f;--accent2:#52b788;--accent-light:#d8f3dc;--header:#1b4332;}
body.dark{--bg:#0d1f14;--bg-card:#152019;--text:#d0ead8;--text-light:#7aab88;--border:#1e3828;--header:#0a1510;--accent-light:#1a3022;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;min-height:100vh;}
.screen{display:none;min-height:100vh;min-height:-webkit-fill-available;flex-direction:column;}
.screen.active{display:flex;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* PIN */
#pin-screen{background:var(--header);align-items:center;justify-content:center;flex-direction:column;gap:28px;padding:40px;}
.pin-logo{width:80px;height:80px;background:rgba(255,255,255,.12);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;}
.pin-title{color:#fff;font-size:24px;font-weight:700;}
.pin-sub{color:rgba(255,255,255,.5);font-size:14px;margin-top:-20px;}
.pin-dots{display:flex;gap:14px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.35);transition:background .12s,border-color .12s;}
.pin-dot.filled{background:#52b788;border-color:#52b788;}
.pin-dot.error{background:#e74c3c;border-color:#e74c3c;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;}
.pin-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:22px;font-weight:600;height:66px;border-radius:16px;cursor:pointer;transition:background .1s,transform .1s;}
.pin-btn:active{background:rgba(255,255,255,.25);transform:scale(.94);}

/* APP SHELL */
#app{display:none;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;}
#app.unlocked{display:flex;}
.app-header{background:var(--header);color:#fff;padding:14px 20px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.hdr-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;}
.hdr-title{flex:1;font-size:18px;font-weight:700;}
.hdr-icon{background:none;border:none;color:rgba(255,255,255,.8);font-size:20px;cursor:pointer;}
.app-nav{background:var(--bg-card);border-top:1px solid var(--border);display:flex;flex-shrink:0;}
.nav-btn{flex:1;background:none;border:none;padding:10px 6px 13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-light);font-size:10px;font-weight:600;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:21px;}

/* VIEWS */
.view{display:none;flex:1;flex-direction:column;overflow:hidden;}
.view.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 28px;}

/* HOME */
.home-banner{background:var(--accent);color:#fff;padding:14px 20px;}
.home-date{font-size:14px;font-weight:700;opacity:.9;}
.home-sub{font-size:12px;opacity:.65;margin-top:2px;}
.prog-bar{height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin-top:8px;}
.prog-fill{height:100%;background:#fff;border-radius:2px;transition:width .4s;}

.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-light);margin:16px 0 8px;}
.zone-list{display:flex;flex-direction:column;gap:10px;}
.zone-row{background:var(--bg-card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow .15s,transform .1s;}
.zone-row:active{transform:scale(.98);}
.zone-row.done{border-color:#52b788;background:#f0fbf4;}
body.dark .zone-row.done{background:#1a3022;border-color:#2d6a4f;}
.z-icon{font-size:28px;width:36px;text-align:center;flex-shrink:0;}
.z-info{flex:1;}
.z-name{font-size:15px;font-weight:700;color:var(--text);}
.z-freq{font-size:11px;color:var(--text-light);margin-top:2px;}
.z-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s;}
.zone-row.done .z-check{background:#52b788;border-color:#52b788;color:#fff;}
.z-arrow{color:var(--text-light);font-size:18px;flex-shrink:0;}

/* ZONE DETAIL */
.zone-detail-hero{background:var(--header);color:#fff;padding:20px;display:flex;align-items:center;gap:16px;}
.zdh-icon{font-size:48px;}
.zdh-info{}
.zdh-name{font-size:22px;font-weight:800;}
.zdh-meta{font-size:13px;opacity:.65;margin-top:4px;}

.proto-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px;}
.proto-card-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.proto-card-hdr-icon{font-size:20px;}
.proto-card-hdr-title{font-size:14px;font-weight:700;color:var(--text);}
.proto-card-body{padding:14px 16px;}
.proto-product{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.proto-product-label{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
.proto-product-val{font-size:14px;color:var(--text);font-weight:500;}
.proto-step{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start;}
.proto-step-num{width:24px;height:24px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.proto-step-text{font-size:14px;color:var(--text);line-height:1.45;flex:1;}
.proto-tip{background:var(--accent-light);border-left:3px solid var(--accent2);padding:10px 12px;border-radius:0 8px 8px 0;font-size:13px;color:var(--accent);margin-top:4px;line-height:1.5;}

.freq-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.fc-dia{background:#d8f3dc;color:#2d6a4f;}
.fc-setmana{background:#fff3cd;color:#856404;}
.fc-mes{background:#fde2e2;color:#842029;}
body.dark .fc-dia{background:#1a3022;color:#52b788;}
body.dark .fc-setmana{background:#2d2500;color:#ffc107;}
body.dark .fc-mes{background:#2d0a0a;color:#f87171;}

.mark-section{background:var(--bg-card);border:1.5px solid var(--border);border-radius:16px;padding:18px 16px;margin-bottom:16px;}
.mark-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;}
.mark-done-banner{display:flex;align-items:center;gap:10px;background:var(--accent-light);border-radius:10px;padding:12px 14px;font-size:14px;font-weight:600;color:var(--accent);}
.btn-mark{width:100%;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn-mark:active{background:#1b4332;}
.btn-mark.done{background:#52b788;}
.btn-unmark{width:100%;background:none;border:1.5px solid var(--border);color:var(--text-light);padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}

/* HISTORY */
.h-day{margin-bottom:20px;}
.h-day-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);margin-bottom:8px;}
.h-row{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.h-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0;}
.h-info{flex:1;}
.h-zone{font-size:13px;font-weight:700;color:var(--text);}
.h-by{font-size:11px;color:var(--accent2);margin-top:2px;}
.h-time{font-size:11px;color:var(--text-light);}
.h-freq{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;margin-left:4px;}
.empty{text-align:center;padding:60px 24px;color:var(--text-light);}
.empty-icon{font-size:48px;display:block;margin-bottom:12px;}

/* ADMIN */
.adm-section{margin-bottom:24px;}
.adm-section-title{font-size:11px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.adm-zone-row{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;}
.adm-zone-name{flex:1;font-size:14px;font-weight:600;}
.adm-row{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.adm-row-name{flex:1;font-size:13px;color:var(--text);}
.adm-del{background:none;border:none;color:#c0392b;font-size:18px;cursor:pointer;padding:4px;}
.add-btn{background:var(--accent-light);border:1.5px dashed var(--accent2);color:var(--accent);padding:12px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;width:100%;text-align:center;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;animation:fadeIn .15s;}
.modal{background:var(--bg-card);border-radius:24px 24px 0 0;padding:22px 20px 36px;width:100%;max-width:520px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px;}
.field-label{font-size:12px;font-weight:700;color:var(--text-light);display:block;margin-bottom:6px;}
.field-input{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:11px 13px;border-radius:10px;font-size:15px;outline:none;margin-bottom:14px;font-family:inherit;}
.field-input:focus{border-color:var(--accent2);}
.field-select{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:11px 13px;border-radius:10px;font-size:15px;outline:none;margin-bottom:14px;appearance:none;font-family:inherit;}
.qnames{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.qname{background:var(--accent-light);border:1.5px solid var(--accent2);color:var(--accent);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;}
.qname.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;margin-top:4px;}
.btn-primary{flex:1;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;}
.btn-cancel{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:14px 18px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1b4332;color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

body.dark .zone-row{background:var(--bg-card);border-color:var(--border);}
body.dark .proto-card{background:var(--bg-card);border-color:var(--border);}
body.dark .mark-section{background:var(--bg-card);border-color:var(--border);}
body.dark .h-row{background:var(--bg-card);}
body.dark .adm-zone-row,.adm-row{background:var(--bg-card);}
body.dark .modal{background:var(--bg-card);}
body.dark .field-input,.field-select{background:var(--bg);}
body.dark .app-nav{background:var(--bg-card);border-color:var(--border);}
</style>
</head>

// ── STATE ──
let _pinBuf='';
let _currentZoneId=null;
let _adminZoneId=null;
let _markZoneId=null;
let _isDark=false;

// ── STORAGE ──
function getZones(){return JSON.parse(localStorage.getItem('calau_clean_zones')||'null')||JSON.parse(JSON.stringify(DEFAULT_ZONES));}
function savZones(z){localStorage.setItem('calau_clean_zones',JSON.stringify(z));}
function getRecords(){return JSON.parse(localStorage.getItem('calau_clean_records2')||'[]');}
function savRecords(r){localStorage.setItem('calau_clean_records2',JSON.stringify(r));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function weekStr(){const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function monthStr(){const d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1);}
function p2(n){return String(n).padStart(2,'0');}
const FREQ_LBL={dia:'Diària',setmana:'Setmanal',mes:'Mensual'};

function isZoneDone(zoneId,freq){
  const records=getRecords();
  if(freq==='dia') return records.some(r=>r.zoneId===zoneId&&r.date===todayStr());
  if(freq==='setmana') return records.some(r=>r.zoneId===zoneId&&r.week===weekStr());
  if(freq==='mes') return records.some(r=>r.zoneId===zoneId&&r.month===monthStr());
  return false;
}

// ── PIN ──
document.getElementById('pin-grid').addEventListener('click',function(e){
  const btn=e.target.closest('[data-d]');if(!btn)return;
  if(btn.id==='pin-del'){_pinBuf=_pinBuf.slice(0,-1);}
  else if(btn.dataset.d!==''&&_pinBuf.length<4){_pinBuf+=btn.dataset.d;}
  renderPinDots();
  if(_pinBuf.length===4){_pinBuf===PIN?unlockApp():pinError();}
});
function renderPinDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pin-dot'+(i<_pinBuf.length?' filled':'');}
function pinError(){for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pin-dot error';setTimeout(()=>{_pinBuf='';renderPinDots();},600);}
function unlockApp(){
  document.getElementById('pin-screen').classList.remove('active');
  document.getElementById('app').style.display='flex';
  _isDark=localStorage.getItem('calau_clean_dark')==='1';
  if(_isDark){document.body.classList.add('dark');document.getElementById('btn-dark').textContent='🌙';}
  renderHome();
  setTimeout(syncFromSupa,2000);
}

// ── NAV ──
document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',function(){

function showView(name){

  document.getElementById('view-'+name).classList.add('active');
  const navTarget=name==='zone'?'home':name==='admin-zone'?'admin':name;

}

document.getElementById('adm-zone-back').addEventListener('click',()=>{showView('admin');renderAdmin();});

// ── HOME ──
function renderHome(){
  const zones=getZones();
  const today=new Date();
  const days=['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];
  const months=['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'];
  document.getElementById('home-date').textContent=days[today.getDay()]+', '+today.getDate()+' '+months[today.getMonth()];

  const dayZones=zones.filter(z=>z.freq==='dia');
  const doneDay=dayZones.filter(z=>isZoneDone(z.id,z.freq)).length;
  document.getElementById('home-sub').textContent=doneDay+'/'+dayZones.length+' zones diàries completades';
  const pct=dayZones.length?Math.round(doneDay/dayZones.length*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';

  const body=document.getElementById('home-body');
  body.innerHTML='';

  ['dia','setmana','mes'].forEach(freq=>{
    const fz=zones.filter(z=>z.freq===freq);
    if(!fz.length)return;
    const stitle=document.createElement('div');
    stitle.className='section-title';
    stitle.textContent={dia:'Neteja diària',setmana:'Neteja setmanal',mes:'Neteja mensual'}[freq];
    body.appendChild(stitle);
    const list=document.createElement('div');
    list.className='zone-list';
    fz.forEach(z=>{
      const done=isZoneDone(z.id,z.freq);
      const row=document.createElement('div');
      row.className='zone-row'+(done?' done':'');
      row.innerHTML=`<div class="z-icon">${z.icon}</div><div class="z-info"><div class="z-name">${z.name}</div><div class="z-freq">${z.product||''}</div></div><div class="z-check">${done?'✓':''}</div><div class="z-arrow">›</div>`;
      row.addEventListener('click',()=>openZone(z.id));
      list.appendChild(row);
    });
    body.appendChild(list);
  });
}

// ── ZONE DETAIL ──
function openZone(zoneId){
  _currentZoneId=zoneId;
  const zone=getZones().find(z=>z.id===zoneId);if(!zone)return;
  document.getElementById('zone-hdr-title').textContent=zone.name;

  const body=document.getElementById('zone-body');
  body.innerHTML='';

  // Hero
  const hero=document.createElement('div');
  hero.className='zone-detail-hero';
  hero.innerHTML=`<div class="zdh-icon">${zone.icon}</div><div class="zdh-info"><div class="zdh-name">${zone.name}</div><div class="zdh-meta">${zone.time||''} &nbsp;·&nbsp; <span class="freq-chip fc-${zone.freq||'dia'}">${FREQ_LBL[zone.freq||'dia']}</span></div></div>`;
  body.appendChild(hero);

  const inner=document.createElement('div');
  inner.style.cssText='padding:16px 16px 28px;display:flex;flex-direction:column;gap:0;';

  // Protocol card
  const pc=document.createElement('div');
  pc.className='proto-card';
  let stepsHtml=(zone.steps||[]).map((s,i)=>`<div class="proto-step"><div class="proto-step-num">${i+1}</div><div class="proto-step-text">${s}</div></div>`).join('');
  let tipHtml=zone.tip?`<div class="proto-tip">💡 ${zone.tip}</div>`:'';
  pc.innerHTML=`
    <div class="proto-card-hdr"><span class="proto-card-hdr-icon">📋</span><span class="proto-card-hdr-title">Protocol de neteja</span></div>
    <div class="proto-card-body">
      <div class="proto-product">
        <div><div class="proto-product-label">🧴 Producte</div><div class="proto-product-val">${zone.product||'—'}</div></div>
      </div>
      ${stepsHtml}
      ${tipHtml}
    </div>`;
  inner.appendChild(pc);

  // Mark section
  const ms=document.createElement('div');
  ms.className='mark-section';
  const done=isZoneDone(zoneId,zone.freq);
  let lastRecord=null;
  if(done){
    const rs=getRecords().filter(r=>r.zoneId===zoneId);
    const freq=zone.freq;
    if(freq==='dia') lastRecord=rs.filter(r=>r.date===todayStr()).sort((a,b)=>b.ts-a.ts)[0];
    else if(freq==='setmana') lastRecord=rs.filter(r=>r.week===weekStr()).sort((a,b)=>b.ts-a.ts)[0];
    else lastRecord=rs.filter(r=>r.month===monthStr()).sort((a,b)=>b.ts-a.ts)[0];
  }
  ms.innerHTML=`<div class="mark-title">Registre de neteja</div>`;
  if(done&&lastRecord){
    const time=new Date(lastRecord.ts).toLocaleTimeString('ca',{hour:'2-digit',minute:'2-digit'});
    ms.innerHTML+=`<div class="mark-done-banner">✅ Fet per <strong style="margin:0 4px;">${lastRecord.by||'?'}</strong> a les ${time}</div><button class="btn-unmark" id="btn-unmark-${zoneId}">Desmarcar</button>`;
    ms.querySelector('#btn-unmark-'+zoneId).addEventListener('click',()=>unmarkZone(zoneId,lastRecord.id));
  } else {
    ms.innerHTML+=`<button class="btn-mark" id="btn-mark-zone">Marcar com a neta ✓</button>`;
    ms.querySelector('#btn-mark-zone').addEventListener('click',()=>openMarkModal(zoneId));
  }
  inner.appendChild(ms);
  body.appendChild(inner);
  showView('zone');
}

function unmarkZone(zoneId,recordId){
  savRecords(getRecords().filter(r=>r.id!==recordId));
  openZone(zoneId);renderHome();showToast('Desmarcat');
}

// ── MARK MODAL ──
function openMarkModal(zoneId){
  _markZoneId=zoneId;
  const zone=getZones().find(z=>z.id===zoneId);
  document.getElementById('mark-modal-title').textContent='Registrar · '+zone.name;
  document.getElementById('mark-by').value='';

}
function renderQnames(sel){

  w.innerHTML='';
  QUICK_NAMES.forEach(n=>{
    const b=document.createElement('button');
    b.className='qname'+(sel===n?' sel':'');

  const record={id:uid(),zoneId:_markZoneId,zoneName:zone.name,zoneIcon:zone.icon,freq:zone.freq,date:todayStr(),week:weekStr(),month:monthStr(),ts:Date.now(),by};
  const records=getRecords();records.push(record);savRecords(records);

// ── SUPABASE ──
async function pushRecord(r){
  if(!navigator.onLine)return;
  try{await fetch(SUPA_URL+'/rest/v1/clean_records',{method:'POST',headers:{..._sh,'Prefer':'return=minimal'},body:JSON.stringify({id:r.id,zone_id:r.zoneId,zone_name:r.zoneName,freq:r.freq,date:r.date,completed_at:new Date(r.ts).toISOString(),completed_by:r.by})});}catch(e){}
}
async function syncFromSupa(){
  if(!navigator.onLine)return;
  try{
    const res=await fetch(SUPA_URL+'/rest/v1/clean_records?order=completed_at.desc&limit=500',{headers:_sh});
    if(!res.ok)return;
    const remote=await res.json();
    const local=getRecords();
    const ids=new Set(local.map(r=>r.id));
    let added=0;
    remote.forEach(r=>{
      if(!ids.has(r.id)){
        const d=r.date||r.completed_at?.slice(0,10)||'';
        const dObj=new Date(r.completed_at||Date.now());
        const day=dObj.getDay()||7;const wd=new Date(dObj);wd.setDate(wd.getDate()-day+1);
        const week=wd.getFullYear()+'-'+p2(wd.getMonth()+1)+'-'+p2(wd.getDate());
        const month=d.slice(0,7);
        local.push({id:r.id,zoneId:r.zone_id,zoneName:r.zone_name,freq:r.freq,date:d,week,month,ts:dObj.getTime(),by:r.completed_by});
        added++;
      }
    });
    if(added>0){savRecords(local);renderHome();}
  }catch(e){}
}

// ── HISTORY ──
function renderHistory(){
  const records=getRecords().sort((a,b)=>b.ts-a.ts);
  const zones=getZones();
  const body=document.getElementById('history-body');
  body.innerHTML='';
  if(!records.length){
    body.innerHTML='<div class="empty"><span class="empty-icon">📋</span>Sense registres encara.</div>';return;
  }
  const byDay={};
  records.forEach(r=>{if(!byDay[r.date])byDay[r.date]=[];byDay[r.date].push(r);});
  Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    const sec=document.createElement('div');sec.className='h-day';
    const today=todayStr();const yest=new Date();yest.setDate(yest.getDate()-1);
    const ys=yest.getFullYear()+'-'+p2(yest.getMonth()+1)+'-'+p2(yest.getDate());
    const lbl=date===today?'Avui — '+date:date===ys?'Ahir — '+date:date;
    sec.innerHTML=`<div class="h-day-label">${lbl}</div>`;
    byDay[date].forEach(r=>{
      const zone=zones.find(z=>z.id===r.zoneId);
      const time=new Date(r.ts).toLocaleTimeString('ca',{hour:'2-digit',minute:'2-digit'});
      const row=document.createElement('div');row.className='h-row';
      row.innerHTML=`<div class="h-icon">${zone?zone.icon:'🧹'}</div><div class="h-info"><div class="h-zone">${r.zoneName}<span class="h-freq freq-chip fc-${r.freq||'dia'}">${FREQ_LBL[r.freq||'dia']}</span></div><div class="h-by">✓ ${r.by||'?'} · ${time}</div></div>`;
      sec.appendChild(row);
    });
    body.appendChild(sec);
  });
}
document.getElementById('btn-export').addEventListener('click',()=>{
  const records=getRecords().sort((a,b)=>b.ts-a.ts);
  const rows=[['Data','Hora','Zona','Freqüència','Fet per']];
  records.forEach(r=>rows.push([r.date,new Date(r.ts).toLocaleTimeString('ca'),r.zoneName,FREQ_LBL[r.freq||'dia'],r.by||'']));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='neteja_'+todayStr()+'.csv';a.click();showToast('📤 CSV exportat');
});

// ── ADMIN ──
function renderAdmin(){
  const zones=getZones();

  body.innerHTML='';
  const sec=document.createElement('div');sec.className='adm-section';
  sec.innerHTML='<div class="adm-section-title">Zones i protocols</div>';

    const row=document.createElement('div');row.className='adm-zone-row';
    row.innerHTML=`<span style="font-size:24px;">${z.icon}</span><span class="adm-zone-name">${z.name}</span><span style="font-size:12px;color:var(--text-light);">${(z.steps||[]).length} passos</span><span style="color:var(--text-light);font-size:18px;"> ›</span>`;

function openAdminZone(zoneId){
  _adminZoneId=zoneId;
  const zone=getZones().find(z=>z.id===zoneId);
  document.getElementById('adm-zone-title').textContent=zone.icon+' '+zone.name;
  renderAdminZone(zone);showView('admin-zone');
}
function renderAdminZone(zone){
  const body=document.getElementById('adm-zone-body');
  body.innerHTML='';
  const info=document.createElement('div');
  info.style.cssText='background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;';
  info.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:8px;">INFO</div><div style="font-size:13px;color:var(--text);margin-bottom:4px;">🧴 <strong>Producte:</strong> ${zone.product||'—'}</div><div style="font-size:13px;color:var(--text);margin-bottom:4px;">⏱ <strong>Temps:</strong> ${zone.time||'—'}</div><div style="font-size:13px;color:var(--text);">📅 <strong>Freqüència:</strong> ${FREQ_LBL[zone.freq||'dia']}</div>`;
  body.appendChild(info);

  const sec=document.createElement('div');sec.className='adm-section';
  sec.innerHTML='<div class="adm-section-title">Passos del protocol</div>';
  (zone.steps||[]).forEach((s,i)=>{
    const row=document.createElement('div');row.className='adm-row';
    row.innerHTML=`<div class="proto-step-num">${i+1}</div><span class="adm-row-name">${s}</span><button class="adm-del" data-idx="${i}">🗑</button>`;
    row.querySelector('.adm-del').addEventListener('click',()=>{
      const zones=getZones();const z=zones.find(z=>z.id===_adminZoneId);
      z.steps.splice(i,1);savZones(zones);renderAdminZone(z);showToast('Pas eliminat');
    });
    sec.appendChild(row);
  });
  const ab=document.createElement('button');ab.className='add-btn';ab.textContent='+ Afegir pas';
  ab.addEventListener('click',()=>openAddStepModal(zone.id));sec.appendChild(ab);
  body.appendChild(sec);

  const delBtn=document.createElement('button');
  delBtn.style.cssText='width:100%;padding:12px;border-radius:12px;border:1px solid #c0392b;background:none;color:#c0392b;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;';
  delBtn.textContent='Eliminar zona';
  delBtn.addEventListener('click',()=>{
    if(!confirm('Eliminar '+zone.name+'?'))return;
    savZones(getZones().filter(z=>z.id!==zone.id));
    showView('admin');renderAdmin();showToast('Zona eliminada');
  });
  body.appendChild(delBtn);
}
