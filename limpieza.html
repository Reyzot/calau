<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calau Neteja">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1b4332">
<title>Calau · Neteja</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{--bg:#f0f7f2;--bg-card:#fff;--text:#1a2e1f;--text-light:#5a7a62;--border:#cce4d4;--header:#1b4332;--accent:#2d6a4f;--accent2:#52b788;--accent-light:#d8f3dc;--red:#c0392b;--orange:#e67e22;--yellow:#f1c40f;}
body.dark{--bg:#0d1f14;--bg-card:#152019;--text:#d0ead8;--text-light:#7aab88;--border:#1e3828;--header:#0a1510;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;transition:background .3s,color .3s;min-height:100vh;}
.screen{display:none;min-height:100vh;min-height:-webkit-fill-available;flex-direction:column;}
.screen.active{display:flex;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* PIN SCREEN */
#pin-screen{background:var(--header);align-items:center;justify-content:center;flex-direction:column;gap:32px;padding:40px;}
.pin-logo{width:80px;height:80px;background:rgba(255,255,255,.12);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;}
.pin-title{color:#fff;font-size:24px;font-weight:700;text-align:center;}
.pin-sub{color:rgba(255,255,255,.55);font-size:14px;text-align:center;}
.pin-dots{display:flex;gap:14px;margin:8px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.4);background:transparent;transition:background .15s;}
.pin-dot.filled{background:#52b788;border-color:#52b788;}
.pin-dot.error{background:#e74c3c;border-color:#e74c3c;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;}
.pin-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:22px;font-weight:600;height:66px;border-radius:16px;cursor:pointer;transition:background .12s,transform .1s;display:flex;align-items:center;justify-content:center;}
.pin-btn:active{background:rgba(255,255,255,.25);transform:scale(.94);}
.pin-btn.pin-del{font-size:18px;}

/* MAIN APP */
#app{display:none;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available;}
#app.unlocked{display:flex;}

/* HEADER */
.app-header{background:var(--header);color:#fff;padding:14px 20px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.app-header-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 4px;opacity:.8;}
.app-header h1{flex:1;font-size:18px;font-weight:700;}
.app-header-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
.app-header-icon{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.85;}

/* NAV */
.app-nav{background:var(--bg-card);border-top:1px solid var(--border);display:flex;flex-shrink:0;safe-area-inset-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;background:none;border:none;padding:10px 6px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-light);font-size:10px;font-weight:600;transition:color .15s;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:22px;}

/* VIEWS */
.view{display:none;flex:1;flex-direction:column;overflow:hidden;}
.view.active{display:flex;}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 24px;}

/* HOME VIEW */
.today-header{background:var(--accent);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.today-date{font-size:15px;font-weight:700;opacity:.9;}
.today-progress{font-size:13px;opacity:.75;}
.progress-bar{height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin-top:6px;}
.progress-fill{height:100%;background:#fff;border-radius:2px;transition:width .4s ease;}

.zone-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:16px;}
.zone-card{background:var(--bg-card);border-radius:16px;padding:16px 14px;cursor:pointer;border:1.5px solid var(--border);transition:box-shadow .2s,transform .1s;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.zone-card:active{transform:scale(.97);}
.zone-card.done{border-color:#52b788;background:#f0fbf4;}
body.dark .zone-card.done{background:#1a3022;}
.zone-icon{font-size:32px;margin-bottom:10px;display:block;}
.zone-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.3;}
.zone-count{font-size:12px;color:var(--text-light);}
.zone-status{display:flex;align-items:center;gap:6px;margin-top:8px;}
.z-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.z-bar-fill{height:100%;background:var(--accent2);border-radius:3px;transition:width .4s;}
.z-pct{font-size:11px;font-weight:700;color:var(--accent);}
.zone-card.done .z-pct{color:#2d6a4f;}

/* ZONE VIEW */
.zone-view-header{padding:16px 20px 12px;background:var(--bg-card);border-bottom:1px solid var(--border);}
.zone-view-icon{font-size:28px;margin-bottom:4px;}
.zone-view-title{font-size:20px;font-weight:800;color:var(--text);}
.zone-view-sub{font-size:12px;color:var(--text-light);margin-top:2px;}

.freq-section{margin-bottom:20px;}
.freq-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-light);padding:0 4px;margin-bottom:8px;}
.task-item{background:var(--bg-card);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;transition:background .15s,border-color .15s;}
.task-item:active{transform:scale(.98);}
.task-item.completed{background:#f0fbf4;border-color:#52b788;}
body.dark .task-item.completed{background:#1a3022;border-color:#2d6a4f;}
.task-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s;}
.task-item.completed .task-check{background:#52b788;border-color:#52b788;color:#fff;}
.task-info{flex:1;}
.task-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;}
.task-item.completed .task-name{color:var(--text-light);text-decoration:line-through;}
.task-by{font-size:11px;color:var(--accent2);margin-top:3px;font-weight:500;}
.task-photo-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.freq-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block;margin-top:3px;}
.freq-dia{background:#d8f3dc;color:#2d6a4f;}
.freq-setmana{background:#fff3cd;color:#856404;}
.freq-mes{background:#fde2e2;color:#842029;}
body.dark .freq-dia{background:#1a3022;color:#52b788;}
body.dark .freq-setmana{background:#2d2500;color:#ffc107;}
body.dark .freq-mes{background:#2d0a0a;color:#f87171;}

/* HISTORY VIEW */
.history-filters{padding:10px 16px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg-card);}
.h-filter{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg-card);cursor:pointer;font-size:12px;font-weight:600;color:var(--text-light);white-space:nowrap;transition:all .15s;}
.h-filter.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.history-day{margin-bottom:20px;}
.h-day-label{font-size:12px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;padding:0 4px;margin-bottom:8px;}
.h-record{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.h-record-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.h-record-info{flex:1;}
.h-record-task{font-size:13px;font-weight:600;color:var(--text);}
.h-record-zone{font-size:11px;color:var(--text-light);}
.h-record-by{font-size:11px;color:var(--accent2);font-weight:500;}
.h-record-time{font-size:11px;color:var(--text-light);}
.h-record-photo{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.empty-state{text-align:center;padding:60px 24px;color:var(--text-light);}
.empty-icon{font-size:48px;display:block;margin-bottom:12px;}

/* ADMIN VIEW */
.admin-section{margin-bottom:24px;}
.admin-section-title{font-size:13px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.6px;padding:0 4px;margin-bottom:10px;}
.admin-zone-row{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;}
.admin-zone-icon{font-size:24px;}
.admin-zone-name{flex:1;font-size:14px;font-weight:600;color:var(--text);}
.admin-zone-count{font-size:12px;color:var(--text-light);}
.admin-arrow{color:var(--text-light);font-size:16px;}
.admin-task-row{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.admin-task-name{flex:1;font-size:13px;font-weight:500;color:var(--text);}
.admin-del-btn{background:none;border:none;color:#c0392b;font-size:18px;cursor:pointer;padding:4px;}
.add-btn{background:var(--accent-light);border:1.5px dashed var(--accent2);color:var(--accent);padding:12px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;width:100%;text-align:center;transition:background .15s;}
.add-btn:active{background:var(--accent-light);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;animation:fadeIn .15s ease;}
.modal{background:var(--bg-card);border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--text-light);margin-bottom:20px;}
.field-label{font-size:12px;font-weight:700;color:var(--text-light);margin-bottom:6px;display:block;}
.field-input{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:15px;outline:none;margin-bottom:16px;font-family:inherit;}
.field-input:focus{border-color:var(--accent2);}
.field-select{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:15px;outline:none;margin-bottom:16px;appearance:none;font-family:inherit;}
.quick-names{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.qname{background:var(--accent-light);border:1.5px solid var(--accent2);color:var(--accent);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;}
.qname.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
.photo-upload{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:16px;color:var(--text-light);font-size:14px;transition:border-color .15s;}
.photo-upload:hover{border-color:var(--accent2);}
.photo-preview{width:100%;border-radius:12px;margin-bottom:16px;max-height:200px;object-fit:cover;display:none;}
.modal-actions{display:flex;gap:10px;margin-top:4px;}
.btn-primary{flex:1;background:var(--accent);color:#fff;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn-primary:active{background:#1b4332;}
.btn-secondary{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:14px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;}
.btn-icon{font-size:14px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1b4332;color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* DARK MODE */
body.dark .zone-card{background:#152019;border-color:#1e3828;}
body.dark .task-item{background:#152019;border-color:#1e3828;}
body.dark .h-record{background:#152019;border-color:#1e3828;}
body.dark .admin-zone-row{background:#152019;border-color:#1e3828;}
body.dark .admin-task-row{background:#152019;border-color:#1e3828;}
body.dark .modal{background:#152019;}
body.dark .field-input{background:#0d1f14;border-color:#1e3828;}
body.dark .field-select{background:#0d1f14;border-color:#1e3828;}
body.dark .photo-upload{border-color:#1e3828;}
body.dark .btn-secondary{background:#0d1f14;border-color:#1e3828;}
body.dark .today-header{background:#1b4332;}
body.dark .app-nav{background:#152019;border-color:#1e3828;}
body.dark .zone-view-header{background:#152019;border-color:#1e3828;}

/* UTILS */
.flex-center{display:flex;align-items:center;justify-content:center;}
.gap-2{gap:8px;}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen" class="screen active">
  <div class="pin-logo">🧹</div>
  <div>
    <div class="pin-title">Calau · Neteja</div>
    <div class="pin-sub">Introdueix el codi per entrar</div>
  </div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-grid" id="pin-grid">
    <button class="pin-btn" data-d="1">1</button>
    <button class="pin-btn" data-d="2">2</button>
    <button class="pin-btn" data-d="3">3</button>
    <button class="pin-btn" data-d="4">4</button>
    <button class="pin-btn" data-d="5">5</button>
    <button class="pin-btn" data-d="6">6</button>
    <button class="pin-btn" data-d="7">7</button>
    <button class="pin-btn" data-d="8">8</button>
    <button class="pin-btn" data-d="9">9</button>
    <button class="pin-btn" data-d=""></button>
    <button class="pin-btn" data-d="0">0</button>
    <button class="pin-btn pin-del" id="pin-del">⌫</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- HOME VIEW -->
  <div id="view-home" class="view active">
    <div class="app-header">
      <span style="font-size:22px;">🧹</span>
      <h1>Neteja</h1>
      <button class="app-header-icon" id="btn-dark-home" title="Mode fosc">☀️</button>
    </div>
    <div class="today-header" id="today-header">
      <div>
        <div class="today-date" id="today-date-label"></div>
        <div class="today-progress" id="today-progress-label"></div>
      </div>
      <div style="text-align:right;font-size:28px;" id="today-emoji">✅</div>
    </div>
    <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;">
      <div class="zone-grid" id="zone-grid"></div>
    </div>
    <nav class="app-nav">
      <button class="nav-btn active" data-nav="home"><span class="nav-icon">🏠</span>Avui</button>
      <button class="nav-btn" data-nav="history"><span class="nav-icon">📋</span>Historial</button>
      <button class="nav-btn" data-nav="admin"><span class="nav-icon">⚙️</span>Gestió</button>
    </nav>
  </div>

  <!-- ZONE VIEW -->
  <div id="view-zone" class="view">
    <div class="app-header">
      <button class="app-header-back" id="zone-back">←</button>
      <h1 id="zone-header-title">Zona</h1>
      <div style="width:40px;"></div>
    </div>
    <div class="zone-view-header" id="zone-view-header"></div>
    <div class="scroll-body" id="zone-task-list"></div>
    <nav class="app-nav">
      <button class="nav-btn" data-nav="home"><span class="nav-icon">🏠</span>Avui</button>
      <button class="nav-btn" data-nav="history"><span class="nav-icon">📋</span>Historial</button>
      <button class="nav-btn" data-nav="admin"><span class="nav-icon">⚙️</span>Gestió</button>
    </nav>
  </div>

  <!-- HISTORY VIEW -->
  <div id="view-history" class="view">
    <div class="app-header">
      <span style="font-size:22px;">📋</span>
      <h1>Historial</h1>
      <button class="app-header-icon" id="btn-export" title="Exportar">📤</button>
    </div>
    <div class="history-filters" id="history-filters"></div>
    <div class="scroll-body" id="history-body"></div>
    <nav class="app-nav">
      <button class="nav-btn" data-nav="home"><span class="nav-icon">🏠</span>Avui</button>
      <button class="nav-btn active" data-nav="history"><span class="nav-icon">📋</span>Historial</button>
      <button class="nav-btn" data-nav="admin"><span class="nav-icon">⚙️</span>Gestió</button>
    </nav>
  </div>

  <!-- ADMIN VIEW -->
  <div id="view-admin" class="view">
    <div class="app-header">
      <span style="font-size:22px;">⚙️</span>
      <h1>Gestió</h1>
      <div style="width:40px;"></div>
    </div>
    <div class="scroll-body" id="admin-body"></div>
    <nav class="app-nav">
      <button class="nav-btn" data-nav="home"><span class="nav-icon">🏠</span>Avui</button>
      <button class="nav-btn" data-nav="history"><span class="nav-icon">📋</span>Historial</button>
      <button class="nav-btn active" data-nav="admin"><span class="nav-icon">⚙️</span>Gestió</button>
    </nav>
  </div>

  <!-- ADMIN ZONE TASKS VIEW -->
  <div id="view-admin-zone" class="view">
    <div class="app-header">
      <button class="app-header-back" id="admin-zone-back">←</button>
      <h1 id="admin-zone-title">Tasques</h1>
      <div style="width:40px;"></div>
    </div>
    <div class="scroll-body" id="admin-zone-body"></div>
    <nav class="app-nav">
      <button class="nav-btn" data-nav="home"><span class="nav-icon">🏠</span>Avui</button>
      <button class="nav-btn" data-nav="history"><span class="nav-icon">📋</span>Historial</button>
      <button class="nav-btn active" data-nav="admin"><span class="nav-icon">⚙️</span>Gestió</button>
    </nav>
  </div>

</div>

<!-- TASK COMPLETE MODAL -->
<div class="modal-overlay" id="task-modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="task-modal-title">Marcar com a feta</div>
    <div class="modal-sub" id="task-modal-sub"></div>
    <label class="field-label">Qui ho ha fet?</label>
    <div class="quick-names" id="quick-names"></div>
    <input class="field-input" id="task-by-input" placeholder="Nom..." autocomplete="off" maxlength="40">
    <label class="field-label">Foto (opcional)</label>
    <div class="photo-upload" id="photo-upload-area">📷 Afegir foto com a evidència</div>
    <input type="file" id="photo-file-input" accept="image/*" capture="environment" style="display:none;">
    <img id="photo-preview" class="photo-preview" alt="">
    <label class="field-label">Notes (opcional)</label>
    <input class="field-input" id="task-notes-input" placeholder="Observacions..." autocomplete="off" maxlength="200">
    <div class="modal-actions">
      <button class="btn-secondary" id="task-modal-cancel" style="flex:0 0 auto;padding:14px 20px;">Cancel·lar</button>
      <button class="btn-primary" id="task-modal-confirm">✓ Confirmar</button>
    </div>
  </div>
</div>

<!-- ADD ZONE MODAL -->
<div class="modal-overlay" id="add-zone-modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nova zona</div>
    <label class="field-label">Nom de la zona</label>
    <input class="field-input" id="new-zone-name" placeholder="p.ex. Magatzem..." maxlength="40" autocomplete="off">
    <label class="field-label">Icona (emoji)</label>
    <input class="field-input" id="new-zone-icon" placeholder="🧹" maxlength="4" style="font-size:24px;text-align:center;">
    <div class="modal-actions">
      <button class="btn-secondary" id="add-zone-cancel" style="flex:0 0 auto;padding:14px 20px;">Cancel·lar</button>
      <button class="btn-primary" id="add-zone-confirm">Afegir zona</button>
    </div>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="add-task-modal-overlay">
  <div class="modal">

function getZones(){return JSON.parse(localStorage.getItem('calau_clean_zones')||'null')||DEFAULT_ZONES;}

function getTasks(){return JSON.parse(localStorage.getItem('calau_clean_tasks')||'null')||DEFAULT_TASKS;}

function getRecords(){return JSON.parse(localStorage.getItem('calau_clean_records')||'[]');}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekStr(){const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function monthStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

function isTaskDoneInPeriod(taskId){
  const task=getTasks().find(t=>t.id===taskId);if(!task)return false;
  const records=getRecords();
  const freq=task.freq;
  if(freq==='dia') return records.some(r=>r.taskId===taskId&&r.date===todayStr());
  if(freq==='setmana') return records.some(r=>r.taskId===taskId&&r.weekStr===weekStr());
  if(freq==='mes') return records.some(r=>r.taskId===taskId&&r.monthStr===monthStr());
  return false;
}

function renderHome(){
  const today=new Date();
  const days=['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];
  const months=['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'];
  document.getElementById('today-date-label').textContent=days[today.getDay()]+', '+today.getDate()+' '+months[today.getMonth()];

  const zones=getZones();
  const tasks=getTasks();
  let totalToday=0,doneToday=0;

  zones.forEach(z=>{
    const zt=tasks.filter(t=>t.zoneId===z.id);
    const todayTasks=zt.filter(t=>t.freq==='dia');
    totalToday+=todayTasks.length;
    doneToday+=todayTasks.filter(t=>isTaskDoneInPeriod(t.id)).length;
  });

  document.getElementById('today-progress-label').textContent=doneToday+' / '+totalToday+' tasques diàries completades';
  document.getElementById('today-emoji').textContent=doneToday===totalToday&&totalToday>0?'✅':'🧹';

  const fill=totalToday>0?Math.round(doneToday/totalToday*100):0;
  const ph=document.getElementById('today-header');
  let pb=ph.querySelector('.progress-bar');
  if(!pb){pb=document.createElement('div');pb.className='progress-bar';ph.appendChild(pb);}
  pb.innerHTML='<div class="progress-fill" style="width:'+fill+'%"></div>';

  const grid=document.getElementById('zone-grid');
  grid.innerHTML='';

    const zt=tasks.filter(t=>t.zoneId===z.id);
    const todayT=zt.filter(t=>t.freq==='dia');
    const doneT=todayT.filter(t=>isTaskDoneInPeriod(t.id)).length;
    const pct=todayT.length>0?Math.round(doneT/todayT.length*100):100;
    const done=pct===100;

    card.className='zone-card'+(done?' done':'');

  });
}

function renderZoneTasks(zoneId){

  const list=document.getElementById('zone-task-list');
  list.innerHTML='';

  freqs.forEach(freq=>{

    const sec=document.createElement('div');
    sec.className='freq-section';
    sec.innerHTML=`<div class="freq-label">${FREQ_LABELS[freq]}</div>`;
    ft.forEach(task=>{
      const done=isTaskDoneInPeriod(task.id);
      const records=getRecords();
      let byRecord=null;
      if(done){
        if(freq==='dia') byRecord=records.filter(r=>r.taskId===task.id&&r.date===todayStr()).sort((a,b)=>b.ts-a.ts)[0];
        else if(freq==='setmana') byRecord=records.filter(r=>r.taskId===task.id&&r.weekStr===weekStr()).sort((a,b)=>b.ts-a.ts)[0];
        else byRecord=records.filter(r=>r.taskId===task.id&&r.monthStr===monthStr()).sort((a,b)=>b.ts-a.ts)[0];
      }
      const row=document.createElement('div');
      row.className='task-item'+(done?' completed':'');
      let photoHtml=byRecord&&byRecord.photoUrl?`<img src="${byRecord.photoUrl}" class="task-photo-thumb" alt="foto">`:'';
      row.innerHTML=`<div class="task-check">${done?'✓':''}</div><div class="task-info"><div class="task-name">${task.name}</div><span class="freq-badge freq-${freq}">${FREQ_LABELS[freq]}</span>${done&&byRecord?`<div class="task-by">✓ ${byRecord.by||'?'} · ${new Date(byRecord.ts).toLocaleTimeString('ca',{hour:'2-digit',minute:'2-digit'})}</div>`:''}</div>${photoHtml}`;
      if(!done){
        row.addEventListener('click',()=>openTaskModal(task));
      }
      sec.appendChild(row);
    });
    list.appendChild(sec);
  });
}

// ── SUPABASE ──
async function uploadPhoto(blob,taskId){
  try{
    const ext=blob.type.includes('png')?'png':'jpg';
    const path='clean/'+taskId+'_'+Date.now()+'.'+ext;
    const res=await fetch(SUPA_URL+'/storage/v1/object/recipe-photos/'+path,{method:'POST',headers:{...(_sh),'Content-Type':blob.type,'x-upsert':'true'},body:blob});
    if(res.ok)return SUPA_URL+'/storage/v1/object/public/recipe-photos/'+path;
  }catch(e){}
  return null;
}
async function pushRecordToSupa(record){
  if(!navigator.onLine)return;
  try{
    await fetch(SUPA_URL+'/rest/v1/clean_records',{method:'POST',headers:{..._sh,'Prefer':'return=minimal'},body:JSON.stringify({
      id:record.id,task_id:record.taskId,zone_id:record.zoneId,zone_name:record.zoneName,
      task_name:record.taskName,freq:record.freq,date:record.date,completed_at:new Date(record.ts).toISOString(),
      completed_by:record.by,photo_url:record.photoUrl,notes:record.notes
    })});
  }catch(e){}
}
async function syncRecordsFromSupa(){
  if(!navigator.onLine)return;
  try{
    const res=await fetch(SUPA_URL+'/rest/v1/clean_records?order=completed_at.desc&limit=500',{headers:_sh});
    if(!res.ok)return;
    const remote=await res.json();
    const local=getRecords();
    const localIds=new Set(local.map(r=>r.id));
    let added=0;
    remote.forEach(r=>{
      if(!localIds.has(r.id)){
        local.push({id:r.id,taskId:r.task_id,zoneId:r.zone_id,zoneName:r.zone_name,taskName:r.task_name,freq:r.freq,date:r.date,weekStr:r.date?r.date.slice(0,7)+'':isoToWeek(r.completed_at),monthStr:r.date?r.date.slice(0,7):'',ts:new Date(r.completed_at).getTime(),by:r.completed_by,photoUrl:r.photo_url,notes:r.notes||''});
        added++;
      }
    });
    if(added>0){savRecords(local);renderHome();}
  }catch(e){}
}
function isoToWeek(iso){
  const d=new Date(iso);const day=d.getDay()||7;d.setDate(d.getDate()-day+1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ── HISTORY ──
function renderHistory(){
  const zones=getZones();
  const filtersEl=document.getElementById('history-filters');
  filtersEl.innerHTML='';
  [{id:'all',name:'Tot'},...zones].forEach(z=>{
    const b=document.createElement('button');
    b.className='h-filter'+(_historyFilter===z.id?' active':'');
    b.textContent=(z.icon?z.icon+' ':'')+z.name;
    b.addEventListener('click',()=>{_historyFilter=z.id;renderHistory();});
    filtersEl.appendChild(b);
  });

  const records=getRecords()
    .filter(r=>_historyFilter==='all'||r.zoneId===_historyFilter)
    .sort((a,b)=>b.ts-a.ts);

  const body=document.getElementById('history-body');
  body.innerHTML='';
  if(!records.length){
    body.innerHTML='<div class="empty-state"><span class="empty-icon">📋</span>Sense registres encara.<br>Comença a marcar tasques per veure l\'historial.</div>';
    return;
  }

  const byDay={};
  records.forEach(r=>{
    if(!byDay[r.date])byDay[r.date]=[];
    byDay[r.date].push(r);
  });

  Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    const sec=document.createElement('div');
    sec.className='history-day';
    const label=formatDateLabel(date);
    sec.innerHTML=`<div class="h-day-label">${label}</div>`;
    byDay[date].forEach(r=>{
      const zone=zones.find(z=>z.id===r.zoneId);
      const time=new Date(r.ts).toLocaleTimeString('ca',{hour:'2-digit',minute:'2-digit'});
      const row=document.createElement('div');
      row.className='h-record';
      row.innerHTML=`<div class="h-record-icon">${zone?zone.icon:'🧹'}</div><div class="h-record-info"><div class="h-record-task">${r.taskName}</div><div class="h-record-zone">${r.zoneName} · <span class="freq-badge freq-${r.freq||'dia'}">${FREQ_LABELS[r.freq||'dia']}</span></div><div class="h-record-by">✓ ${r.by||'?'} · ${time}</div>${r.notes?`<div style="font-size:11px;color:var(--text-light);margin-top:2px;">📝 ${r.notes}</div>`:''}</div>${r.photoUrl?`<img src="${r.photoUrl}" class="h-record-photo" alt="">`:''}`;
      sec.appendChild(row);
    });
    body.appendChild(sec);
  });
}
function formatDateLabel(dateStr){
  const today=todayStr();
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const ys=yesterday.getFullYear()+'-'+String(yesterday.getMonth()+1).padStart(2,'0')+'-'+String(yesterday.getDate()).padStart(2,'0');
  if(dateStr===today)return 'Avui — '+dateStr;
  if(dateStr===ys)return 'Ahir — '+dateStr;
  return dateStr;
}

document.getElementById('btn-export').addEventListener('click',exportCsv);
function exportCsv(){
  const records=getRecords().sort((a,b)=>b.ts-a.ts);
  const rows=[['Data','Hora','Zona','Tasca','Freqüència','Fet per','Notes','Foto']];
  records.forEach(r=>{
    rows.push([r.date,new Date(r.ts).toLocaleTimeString('ca'),r.zoneName,r.taskName,FREQ_LABELS[r.freq||'dia'],r.by||'',r.notes||'',r.photoUrl||'']);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='neteja_'+todayStr()+'.csv';a.click();
  URL.revokeObjectURL(url);
  showToast('📤 CSV exportat');
}

  const infosec=document.createElement('div');
  infosec.className='admin-section';
  infosec.innerHTML=`<div class="admin-section-title">Informació APPCC</div><div style="background:var(--accent-light);border:1.5px solid var(--accent2);border-radius:12px;padding:14px;font-size:13px;color:var(--accent);line-height:1.6;">📋 Tots els registres queden guardats amb <strong>data, hora i nom</strong> de qui ha fet la neteja.<br><br>En cas d'inspecció sanitària pots exportar el CSV o mostrar l'historial directament.<br><br>🔒 L'app és privada, protegida amb PIN.</div>`;
  body.appendChild(infosec);
}

function openAdminZone(zoneId){
  _adminZoneId=zoneId;
  const zone=getZones().find(z=>z.id===zoneId);
  document.getElementById('admin-zone-title').textContent=zone.icon+' '+zone.name;
  renderAdminZoneTasks(zoneId);
  showView('admin-zone');
}
document.getElementById('admin-zone-back').addEventListener('click',()=>{showView('admin');renderAdmin();});

function renderAdminZoneTasks(zoneId){
  const tasks=getTasks().filter(t=>t.zoneId===zoneId);
  const body=document.getElementById('admin-zone-body');
  body.innerHTML='';

  ['dia','setmana','mes'].forEach(freq=>{
    const ft=tasks.filter(t=>t.freq===freq);
    if(!ft.length)return;
    const sec=document.createElement('div');
    sec.className='admin-section';
    sec.innerHTML='<div class="admin-section-title">'+FREQ_LABELS[freq]+'</div>';
    ft.forEach(task=>{
      const row=document.createElement('div');
      row.className='admin-task-row';
      row.innerHTML=`<span class="task-check" style="cursor:default;"></span><span class="admin-task-name">${task.name}</span><button class="admin-del-btn" data-tid="${task.id}" title="Eliminar">🗑</button>`;
      row.querySelector('.admin-del-btn').addEventListener('click',()=>deleteTask(task.id));
      sec.appendChild(row);
    });
    body.appendChild(sec);
  });

  const addBtn=document.createElement('button');
  addBtn.className='add-btn';addBtn.textContent='+ Afegir tasca';
  addBtn.addEventListener('click',()=>openAddTaskModal(zoneId));
  body.appendChild(addBtn);

  const delZoneBtn=document.createElement('button');
  delZoneBtn.style.cssText='width:100%;padding:12px;border-radius:12px;border:1px solid var(--red);background:none;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;';
  delZoneBtn.textContent='Eliminar zona';
  delZoneBtn.addEventListener('click',()=>deleteZone(zoneId));
  body.appendChild(delZoneBtn);
}

function deleteTask(taskId){
  const tasks=getTasks().filter(t=>t.id!==taskId);
  savTasks(tasks);renderAdminZoneTasks(_adminZoneId);showToast('Tasca eliminada');
}
function deleteZone(zoneId){
  if(!confirm('Eliminar aquesta zona i totes les seves tasques?'))return;
  savZones(getZones().filter(z=>z.id!==zoneId));
  savTasks(getTasks().filter(t=>t.zoneId!==zoneId));
  showView('admin');renderAdmin();showToast('Zona eliminada');
}

// ── ADD ZONE MODAL ──
function openAddZoneModal(){
  document.getElementById('new-zone-name').value='';
  document.getElementById('new-zone-icon').value='🧹';
  document.getElementById('add-zone-modal-overlay').classList.add('open');
  document.getElementById('new-zone-name').focus();
}
document.getElementById('add-zone-cancel').addEventListener('click',()=>document.getElementById('add-zone-modal-overlay').classList.remove('open'));
document.getElementById('add-zone-modal-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('add-zone-confirm').addEventListener('click',()=>{
  const name=document.getElementById('new-zone-name').value.trim();
  const icon=document.getElementById('new-zone-icon').value.trim()||'🧹';
  if(!name)return;
  const zones=getZones();
  zones.push({id:'z'+uid(),name,icon});
  savZones(zones);
  document.getElementById('add-zone-modal-overlay').classList.remove('open');
  renderAdmin();showToast('Zona afegida');
});

// ── ADD TASK MODAL ──
let _addTaskZoneId=null;
function openAddTaskModal(zoneId){
  _addTaskZoneId=zoneId;
  document.getElementById('new-task-name').value='';
  document.getElementById('new-task-freq').value='dia';
  document.getElementById('add-task-modal-overlay').classList.add('open');
  document.getElementById('new-task-name').focus();
}
document.getElementById('add-task-cancel').addEventListener('click',()=>document.getElementById('add-task-modal-overlay').classList.remove('open'));
document.getElementById('add-task-modal-overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('add-task-confirm').addEventListener('click',()=>{
  const name=document.getElementById('new-task-name').value.trim();
  const freq=document.getElementById('new-task-freq').value;
  if(!name)return;
  const tasks=getTasks();
  tasks.push({id:'t'+uid(),zoneId:_addTaskZoneId,name,freq});
  savTasks(tasks);
  document.getElementById('add-task-modal-overlay').classList.remove('open');
  renderAdminZoneTasks(_addTaskZoneId);showToast('Tasca afegida');
});

// ── DARK MODE ──
document.getElementById('btn-dark-home').addEventListener('click',()=>{
  _isDark=!_isDark;
  document.body.classList.toggle('dark',_isDark);
  localStorage.setItem('calau_clean_dark',_isDark?'1':'0');
  document.getElementById('btn-dark-home').textContent=_isDark?'🌙':'☀️';
});

// ── TOAST ──
let _toastT=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(_toastT)clearTimeout(_toastT);
  _toastT=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── VISIBILITY / SYNC ──
let _hiddenAt=0;
document.addEventListener('visibilitychange',function(){
  if(document.hidden){_hiddenAt=Date.now();}
  else{
    if(_hiddenAt&&Date.now()-_hiddenAt>5*60*1000){location.reload();}
    else if(document.getElementById('app').classList.contains('unlocked')){syncRecordsFromSupa();}
  }
});

// ── INIT SYNC ──
setTimeout(()=>{
  if(document.getElementById('app').classList.contains('unlocked'))syncRecordsFromSupa();
},2000);
</script>
</body>
