<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Conexión</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5;}
button{background:#333;color:#fff;padding:12px 20px;border:none;border-radius:8px;font-size:16px;width:100%;margin-bottom:10px;cursor:pointer;}
.result{background:#fff;border-radius:8px;padding:12px;margin-bottom:10px;word-break:break-all;font-size:13px;}
.ok{border-left:4px solid #4caf50;}
.err{border-left:4px solid #f44336;}
.info{border-left:4px solid #aaa;}
</style>
</head>
<body>
<h2>Test Conexión Supabase</h2>
<button onclick="runTest()">▶ Ejecutar Test</button>
<div id="out"></div>
<script>
const URL="https://mbvmvzmjpiofxkukdxyb.supabase.co/rest/v1/recipes?select=id,name";
const KEY="sb_publishable_avKRxfagFn9yQ8tx0qfQHw_1WnnLxHr";

function log(msg,type){
  const d=document.createElement("div");
  d.className="result "+(type||"info");
  d.textContent=msg;
  document.getElementById("out").appendChild(d);
}

async function tryFetch(label,url,opts){
  log("⏳ Probando: "+label,"info");
  try{
    const r=await fetch(url,opts);
    if(r.ok){
      const data=await r.json();
      log("✅ "+label+" → OK ("+data.length+" recetas)","ok");
    }else{
      log("❌ "+label+" → HTTP "+r.status,"err");
    }
  }catch(e){
    log("❌ "+label+" → ERROR: "+e.message,"err");
  }
}

async function runTest(){
  document.getElementById("out").innerHTML="";
  log("Navegador: "+navigator.userAgent,"info");
  log("Online: "+navigator.onLine,"info");

  await tryFetch("Sin headers (URL param)",URL+"&apikey="+KEY,{credentials:"omit"});
  await tryFetch("Con Authorization header",URL,{headers:{"Authorization":"Bearer "+KEY},credentials:"omit"});
  await tryFetch("Con apikey header",URL,{headers:{"apikey":KEY,"Authorization":"Bearer "+KEY},credentials:"omit"});
  await tryFetch("Sin credentials:omit",URL+"&apikey="+KEY,{});

  log("✔ Tests completados","info");
}
</script>
</body>
</html>
